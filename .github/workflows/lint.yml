name: Lint and consistency

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tools
        run: python -m pip install --disable-pip-version-check "ruff==0.12.2"
      - name: Ruff
        run: ruff check src tests tools
      - name: Compile Python sources
        run: python -m compileall -q src tests tools
      - name: Check authored and generated course content
        run: make references challenges native-tests-content validate
